name: SJTU体育场地数据同步

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 创建输出目录
        run: mkdir -p output

      - name: 查找爬虫脚本位置
        id: find-script
        run: |
          echo "script_path=$(find . -name 'sjtu_crawler_auto.py' -type f | head -1)" >> $GITHUB_OUTPUT

      - name: 运行爬虫脚本
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 ${{ steps.find-script.outputs.script_path }}

      - name: 上传数据作为artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: venue-data
          path: $(find . -name "all_venues_booking_data.json" -type f | head -1)
