name: SJTU体育场地数据同步

on:
  schedule:
    - cron: '0,30 * * * *' 
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 诊断目录结构
        run: |
          echo "=== github.workspace ==="
          echo ${{ github.workspace }}
          echo ""
          echo "=== github.repository ==="
          echo ${{ github.repository }}
          echo ""
          echo "=== 根目录文件 ==="
          ls -la
          echo ""
          echo "=== 递归查找所有文件 ==="
          find . -type f -name "*.py" 2>/dev/null | head -20

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: 运行爬虫
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          SCRIPT=$(find . -name "sjtu_crawler_auto.py" -type f | head -1)
          echo "运行脚本: $SCRIPT"
          SCRIPT_DIR=$(dirname "$SCRIPT")
          cd "$SCRIPT_DIR"
          python3 sjtu_crawler_auto.py
